<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Eric91-R - 图片集</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; }
        h1 { text-align: center; color: #38bdf8; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .item { position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 1/1; cursor: pointer; }
        .item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .item:hover img { transform: scale(1.05); }
        .comment-box { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); padding: 10px; transform: translateY(100%); transition: transform 0.3s; }
        .item:hover .comment-box { transform: translateY(0); }
        .comment-input { width: 100%; padding: 8px; border: none; border-radius: 6px; background: #1e293b; color: white; font-size: 0.9rem; }
        .back-btn { display: block; width: max-content; margin: 30px auto 0; padding: 12px 24px; background: #38bdf8; color: #0f172a; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { max-width: 90vw; max-height: 90vh; }
        .modal-content img { width: 100%; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ 我的图片集</h1>
        <div class="grid">
            <!-- ⚠️ 替换成你的图片地址 -->
            <div class="item" onclick="openLightbox('https://picsum.photos/800/600?random=1')">
                <img src="https://picsum.photos/300/300?random=1" alt="">
                <div class="comment-box"><input class="comment-input" placeholder="短评(≤10字)" maxlength="10" onchange="postComment('img1', this.value)"></div>
            </div>
            <div class="item" onclick="openLightbox('https://picsum.photos/800/600?random=2')">
                <img src="https://picsum.photos/300/300?random=2" alt="">
                <div class="comment-box"><input class="comment-input" placeholder="短评(≤10字)" maxlength="10" onchange="postComment('img2', this.value)"></div>
            </div>
            <div class="item" onclick="openLightbox('https://picsum.photos/800/600?random=3')">
                <img src="https://picsum.photos/300/300?random=3" alt="">
                <div class="comment-box"><input class="comment-input" placeholder="短评(≤10字)" maxlength="10" onchange="postComment('img3', this.value)"></div>
            </div>
            <div class="item" onclick="openLightbox('https://picsum.photos/800/600?random=4')">
                <img src="https://picsum.photos/300/300?random=4" alt="">
                <div class="comment-box"><input class="comment-input" placeholder="短评(≤10字)" maxlength="10" onchange="postComment('img4', this.value)"></div>
            </div>
        </div>
        <a href="index.html" class="back-btn">← 返回首页</a>
    </div>

    <div id="lightbox" class="modal" onclick="closeLightbox()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="lightboxImg" src="">
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cjmbiavxmionhvchctlif.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ES5Wf2uufFD088bVpzgRtQ_8MGKF...'; // 你的密钥
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function openLightbox(src) { document.getElementById('lightboxImg').src = src; document.getElementById('lightbox').classList.add('active'); }
        function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }
        
        async function postComment(imageId, comment) {
            if (!comment.trim()) return;
            await supabase.from('image_comments').insert({ image_id: imageId, comment });
            alert('评论已提交！');
        }
    </script>
</body>
</html>
