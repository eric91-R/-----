<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eric91-R | Portfolio</title>
    <style>
        :root {
            --klein-blue: #002FA7;
            --dark-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.07);
            --text-primary: #f0f0f0;
            --text-secondary: rgba(240, 240, 240, 0.6);
            --accent: #00d4ff;
            --danger: #ff4757;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(-45deg, var(--klein-blue), #001f4d, #000814, #000);
            background-size: 400% 400%;
            animation: flowBG 20s ease infinite;
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }
        @keyframes flowBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        /* Header */
        header { text-align: center; padding: 50px 20px 30px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 40px; }
        header h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 700; letter-spacing: 2px; }
        header p { color: var(--accent); margin-top: 10px; font-size: 1.1rem; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 25px; margin-bottom: 50px; }

        /* Card */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,212,255,0.15); }
        .card h3 { font-size: 1.3rem; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .card p { color: var(--text-secondary); font-size: 0.95rem; flex-grow: 1; }
        .card .btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: background 0.3s;
        }
        .card .btn:hover { background: #00b8e6; }

        /* Time */
        #currentTime { font-size: 1.8rem; font-weight: bold; color: var(--accent); }
        #currentDate { font-size: 0.9rem; color: #888; margin-top: 5px; }

        /* Gallery Cover */
        .gallery-section { margin-bottom: 50px; }
        .gallery-cover .card { flex-direction: row; align-items: center; gap: 30px; padding: 20px; }
        .gallery-cover img { width: 240px; height: 160px; object-fit: cover; border-radius: 12px; flex-shrink: 0; }
        .gallery-grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .gallery-grid.active { display: grid; }
        .gallery-item { position: relative; border-radius: 12px; overflow: hidden; cursor: pointer; }
        .gallery-item img { width: 100%; height: 180px; object-fit: cover; transition: transform 0.4s; }
        .gallery-item:hover img { transform: scale(1.08); }
        .gallery-item .comment-input {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px;
            background: rgba(0,0,0,0.7);
            border: none;
            color: white;
            font-size: 12px;
            text-align: center;
            outline: none;
        }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; padding: 20px; overflow-y: auto; }
        .modal.active { display: flex; }
        .modal-content {
            background: #111;
            padding: 30px;
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            border: 1px solid #333;
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #888; }

        /* Message List */
        .message-list { margin-top: 20px; }
        .message-item { padding: 15px; border-bottom: 1px solid #222; }
        .message-item:last-child { border-bottom: none; }
        .message-item p { margin-bottom: 5px; }
        .message-item small { color: #666; font-size: 12px; }
        .delete-btn {
            float: right;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            display: none; /* Shown by admin */
        }
        .admin-mode .delete-btn { display: inline-block; }

        /* Input */
        .input-group { margin-top: 20px; display: flex; gap: 10px; }
        .input-group input {
            flex: 1;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #222;
            color: white;
            font-size: 14px;
        }
        .input-group button {
            padding: 12px 20px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .gallery-cover .card { flex-direction: column; text-align: center; }
            .gallery-cover img { width: 100%; max-width: 320px; }
            .card { padding: 20px; }
            .input-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Eric91-R</h1>
            <p>构建优雅的数字体验</p>
        </header>

        <!-- Dashboard Grid -->
        <div class="grid">
            <!-- Time -->
            <div class="card">
                <h3>🕒 实时时间</h3>
                <div id="currentTime">--:--:--</div>
                <div id="currentDate">加载中...</div>
            </div>

            <!-- Music -->
            <div class="card" id="musicCard">
                <h3>🎵 背景音乐</h3>
                <p>点击控制播放状态</p>
                <div id="musicStatus" style="margin-top:15px; color:var(--accent); font-weight:bold;">暂停中</div>
            </div>

            <!-- Visitors -->
            <div class="card">
                <h3>👥 访客统计</h3>
                <p>累计访问次数</p>
                <div id="visitorCount" style="font-size:2rem; font-weight:bold; color:var(--accent); margin-top:10px;">...</div>
            </div>

            <!-- Messages Link -->
            <div class="card" onclick="openModal('messageModal')">
                <h3>💬 留言板</h3>
                <p>点击进入，匿名留言，管理员可审核。</p>
                <div class="btn">进入留言板</div>
            </div>
        </div>

        <!-- Gallery Section -->
        <div class="gallery-section">
            <h2 style="font-size:1.8rem; margin-bottom:20px;">🖼️ 精选图片</h2>
            <div class="gallery-cover">
                <div class="card">
                    <img src="https://picsum.photos/600/400?random=1" alt="Cover">
                    <div>
                        <h3>光影瞬间</h3>
                        <p>记录生活的每一帧。点击按钮展开全部，点击图片查看大图，每张图下可留短评。</p>
                        <button onclick="event.stopPropagation(); toggleGallery()" class="btn">去看更多照片</button>
                    </div>
                </div>
            </div>
            <div class="gallery-grid" id="galleryGrid">
                <!-- Items injected by JS -->
            </div>
        </div>
    </div>

    <!-- Message Modal -->
    <div class="modal" id="messageModal" onclick="closeModal('messageModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal('messageModal')">&times;</span>
            <h2>💬 留言板</h2>
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="写下你的留言..." maxlength="100">
                <button onclick="postMessage()">发送</button>
            </div>
            <div class="input-group" style="margin-top:10px;">
                <input type="password" id="adminPassword" placeholder="管理员密码（留空则跳过）">
            </div>
            <div id="messageList" class="message-list">
                <!-- Messages loaded here -->
            </div>
        </div>
    </div>

    <!-- Image Lightbox -->
    <div class="modal" id="lightboxModal" onclick="closeModal('lightboxModal')">
        <div class="modal-content" onclick="event.stopPropagation()" style="background:transparent; border:none; box-shadow:none; max-width:90vw;">
            <span class="modal-close" onclick="closeModal('lightboxModal')">&times;</span>
            <img id="lightboxImg" src="" style="width:100%; border-radius:12px;">
            <div id="lightboxComments" style="margin-top:15px; text-align:center; color:white;"></div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // === Config ===
        const SUPABASE_URL = 'https://cjmbiavxmionhvchctlif.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ES5Wf2uufFD088bVpzgRtQ_8MGKF...'; // CHANGE ME
        const ADMIN_PASSWORD = 'eric123'; // Change this!
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // === State ===
        let isAdmin = localStorage.getItem('isAdmin') === 'true';

        // === Time ===
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('zh-CN', {hour12:false});
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
        }
        setInterval(updateTime, 1000);
        updateTime();

        // === Music ===
        const music = document.getElementById('bgMusic');
        const musicCard = document.getElementById('musicCard');
        const musicStatus = document.getElementById('musicStatus');
        musicCard.addEventListener('click', () => {
            if (music.paused) { music.play(); musicStatus.textContent = '播放中'; }
            else { music.pause(); musicStatus.textContent = '暂停中'; }
        });

        // === Visitors ===
        async function logAndShowVisitors() {
            await supabase.from('visitors').insert({ page: 'home' });
            const { count } = await supabase.from('visitors').select('*', { count: 'exact', head: true });
            document.getElementById('visitorCount').textContent = count || 0;
        }
        logAndShowVisitors();

        // === Gallery ===
        const galleryImages = [
            { id: 'img1', url: 'https://picsum.photos/600/400?random=2', title: '城市夜景' },
            { id: 'img2', url: 'https://picsum.photos/600/400?random=3', title: '山间晨雾' },
            { id: 'img3', url: 'https://picsum.photos/600/400?random=4', title: '海边日落' },
            { id: 'img4', url: 'https://picsum.photos/600/400?random=5', title: '街头抓拍' },
            { id: 'img5', url: 'https://picsum.photos/600/400?random=6', title: '静物特写' },
        ];

        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            galleryImages.forEach(img => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.innerHTML = `
                    <img src="${img.url}" onclick="openLightbox('${img.url}', '${img.id}')">
                    <input class="comment-input" placeholder="短评(≤10字)" maxlength="10" onchange="postImageComment('${img.id}', this.value)">
                `;
                grid.appendChild(item);
            });
        }

        function toggleGallery() {
            document.getElementById('galleryGrid').classList.toggle('active');
            if (document.getElementById('galleryGrid').classList.contains('active')) {
                renderGallery();
                loadAllImageComments();
            }
        }

        // === Image Comments ===
        async function postImageComment(imageId, comment) {
            if (!comment.trim()) return;
            await supabase.from('image_comments').insert({ image_id: imageId, comment });
            loadImageComments(imageId);
        }

        async function loadImageComments(imageId) {
            const { data } = await supabase.from('image_comments').select('comment').eq('image_id', imageId).order('created_at', { ascending: false });
            // Update UI logic here (simplified for brevity)
        }

        async function loadAllImageComments() {
            // Load comments for all visible images
        }

        // === Lightbox ===
        function openLightbox(src, imageId) {
            document.getElementById('lightboxImg').src = src;
            document.getElementById('lightboxModal').classList.add('active');
            loadImageComments(imageId);
        }

        // === Messages ===
        async function postMessage() {
            const input = document.getElementById('messageInput');
            const passwordInput = document.getElementById('adminPassword');
            const content = input.value.trim();
            if (!content) return;

            if (passwordInput.value === ADMIN_PASSWORD) {
                localStorage.setItem('isAdmin', 'true');
                isAdmin = true;
            }

            await supabase.from('messages').insert({ content });
            input.value = '';
            loadMessages();
        }

        async function loadMessages() {
            const { data } = await supabase.from('messages').select('*').eq('is_deleted', false).order('created_at', { ascending: false });
            const list = document.getElementById('messageList');
            list.innerHTML = '';
            data.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message-item' + (isAdmin ? ' admin-mode' : '');
                div.innerHTML = `
                    <p>${msg.content}</p>
                    <small>${new Date(msg.created_at).toLocaleString()}</small>
                    <button class="delete-btn" onclick="deleteMessage(${msg.id})">删</button>
                `;
                list.appendChild(div);
            });
        }

        async function deleteMessage(id) {
            if (!isAdmin) { alert('管理员密码错误'); return; }
            await supabase.from('messages').update({ is_deleted: true }).eq('id', id);
            loadMessages();
        }

        // === Modal Control ===
        function openModal(id) {
            document.getElementById(id).classList.add('active');
            if (id === 'messageModal') loadMessages();
        }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // Initial Render
        renderGallery();
    </script>
</body>
</html>
