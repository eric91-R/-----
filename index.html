<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Eric91-R | 构建优雅的数字体验</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --accent: #38bdf8; --danger: #f87171; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; padding: 30px 0; border-bottom: 1px solid #334155; }
        .avatar { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--accent); margin: 0 auto 15px; cursor: pointer; object-fit: cover; transition: transform 0.3s; }
        .avatar:hover { transform: scale(1.05); }
        h1 { font-size: 2.5rem; color: #fff; }
        .subtitle { color: var(--accent); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 40px; }
        .card { background: var(--card); border-radius: 14px; padding: 25px; border: 1px solid #334155; transition: transform 0.3s, box-shadow 0.3s; cursor: pointer; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 10px 30px rgba(56, 189, 248, 0.1); }
        .card h2 { font-size: 1.3rem; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .card p { color: #94a3b8; font-size: 0.95rem; }
        .status { margin-top: 15px; padding: 10px; background: rgba(56, 189, 248, 0.1); border-radius: 8px; color: var(--accent); font-weight: bold; text-align: center; }
        .btn { display: block; width: 100%; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; text-align: center; text-decoration: none; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 14px; max-width: 500px; width: 100%; max-height: 80vh; overflow-y: auto; position: relative; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #94a3b8; }
        .input-group { margin-bottom: 15px; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #334155; border-radius: 8px; background: #020617; color: #fff; font-size: 1rem; }
        .message-list { max-height: 300px; overflow-y: auto; margin-top: 20px; }
        .message-item { background: #020617; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        .message-item p { margin-bottom: 5px; }
        .message-item small { color: #64748b; font-size: 0.8rem; }
        .delete-btn { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; float: right; }
        footer { text-align: center; margin-top: 50px; padding-top: 20px; border-top: 1px solid #334155; color: #64748b; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } h1 { font-size: 2rem; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <!-- ⚠️ 替换成你的头像地址 -->
            <img src="https://avatars.githubusercontent.com/u/your-github-id?v=4" alt="Eric91-R" class="avatar" onclick="window.location.href='about.html'">
            <h1>Eric91-R</h1>
            <p class="subtitle">构建优雅的数字体验</p>
        </header>

        <div class="grid">
            <!-- 实时时间 -->
            <div class="card" onclick="showTimeModal()">
                <h2>🕒 实时时间</h2>
                <p>当前系统时间</p>
                <div class="status" id="timeStatus">加载中...</div>
            </div>

            <!-- 背景音乐 -->
            <div class="card" onclick="toggleMusic()">
                <h2>🎵 背景音乐</h2>
                <p>点击控制播放状态</p>
                <div class="status" id="musicStatus">暂停中</div>
            </div>

            <!-- 访客统计 -->
            <div class="card" onclick="showVisitorModal()">
                <h2>👥 访客统计</h2>
                <p>累计访问次数</p>
                <div class="status" id="visitorCount">...</div>
            </div>

            <!-- 留言板 -->
            <div class="card" onclick="showMessageModal()">
                <h2>💬 留言板</h2>
                <p>匿名留言，管理员可审核</p>
                <div class="status">点击进入</div>
            </div>

            <!-- 图片集 -->
            <div class="card" onclick="window.location.href='gallery.html'">
                <h2>🖼️ 图片集</h2>
                <p>滑动浏览，每张可评论</p>
                <div class="status">点击浏览</div>
            </div>

            <!-- 精选图片 -->
            <div class="card" onclick="window.location.href='featured.html'">
                <h2>⭐ 精选图片</h2>
                <p>封面展示，更多点击进入</p>
                <div class="status">查看详情</div>
            </div>
        </div>

        <footer>© 2025 Eric91-R. Hosted on GitHub Pages.</footer>
    </div>

    <!-- 时间模态框 -->
    <div id="timeModal" class="modal" onclick="closeModal('timeModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal('timeModal')">&times;</span>
            <h2>🕒 实时时间</h2>
            <div id="detailedTime" style="font-size: 2rem; text-align: center; margin: 20px 0;"></div>
            <div id="detailedDate" style="text-align: center; color: #94a3b8;"></div>
        </div>
    </div>

    <!-- 访客模态框 -->
    <div id="visitorModal" class="modal" onclick="closeModal('visitorModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal('visitorModal')">&times;</span>
            <h2>👥 访客统计</h2>
            <p style="text-align: center; margin: 20px 0;">累计访问次数：<span id="visitorCountModal" style="color: var(--accent); font-size: 2rem;">0</span></p>
            <button class="btn" onclick="closeModal('visitorModal')">关闭</button>
        </div>
    </div>

    <!-- 留言板模态框 -->
    <div id="messageModal" class="modal" onclick="closeModal('messageModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeModal('messageModal')">&times;</span>
            <h2>💬 留言板</h2>
            <div class="input-group">
                <textarea id="messageInput" rows="3" placeholder="写下你的留言..."></textarea>
            </div>
            <div class="input-group">
                <input type="password" id="adminPass" placeholder="管理员密码（留空则跳过）">
            </div>
            <button class="btn" onclick="postMessage()">提交留言</button>
            <div class="message-list" id="messageList">
                <p style="text-align: center; color: #64748b;">暂无留言，快来第一条吧！</p>
            </div>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ⚠️ 必须替换成你自己的 Supabase 信息
        const SUPABASE_URL = 'https://cjmbiavxmionhvchctlif.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_ES5Wf2uufFD088bVpzgRtQ_8MGKF...'; // 你的密钥
        const ADMIN_PASSWORD = 'eric123'; // 改成你自己的管理员密码
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let isMusicPlaying = false;
        let currentVisitorCount = 0;

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            updateTime();
            setInterval(updateTime, 1000);
            await initVisitorCount();
            loadMessages();
        });

        // 时间
        function updateTime() {
            const now = new Date();
            const t = now.toLocaleTimeString('zh-CN', { hour12: false });
            const d = now.toLocaleDateString('zh-CN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('timeStatus').textContent = t;
            document.getElementById('detailedTime').textContent = t;
            document.getElementById('detailedDate').textContent = d;
        }

        // 音乐
        function toggleMusic() {
            const m = document.getElementById('bgMusic');
            if (isMusicPlaying) { m.pause(); isMusicPlaying = false; document.getElementById('musicStatus').textContent = '暂停中'; }
            else { m.play(); isMusicPlaying = true; document.getElementById('musicStatus').textContent = '播放中'; }
        }

        // 访客统计
        async function initVisitorCount() {
            const { data, error } = await supabase.from('visitor_count').select('count').limit(1).single();
            if (error || !data) {
                await supabase.from('visitor_count').insert({ count: 1 });
                currentVisitorCount = 1;
            } else {
                currentVisitorCount = data.count + 1;
                await supabase.from('visitor_count').update({ count: currentVisitorCount }).eq('id', data.id);
            }
            document.getElementById('visitorCount').textContent = currentVisitorCount;
            document.getElementById('visitorCountModal').textContent = currentVisitorCount;
        }

        // 留言板
        async function postMessage() {
            const content = document.getElementById('messageInput').value.trim();
            const pass = document.getElementById('adminPass').value;
            if (!content) return alert('请输入留言');
            if (pass === ADMIN_PASSWORD) localStorage.setItem('isAdmin', 'true');
            await supabase.from('messages').insert({ content });
            document.getElementById('messageInput').value = '';
            loadMessages();
        }

        async function loadMessages() {
            const { data } = await supabase.from('messages').select('*').eq('is_deleted', false).order('created_at', { ascending: false });
            const list = document.getElementById('messageList');
            list.innerHTML = '';
            if (!data?.length) return list.innerHTML = '<p style="text-align:center;color:#64748b;">暂无留言</p>';
            data.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message-item';
                div.innerHTML = `<p>${msg.content}</p><small>${new Date(msg.created_at).toLocaleString()}</small>`;
                if (localStorage.getItem('isAdmin') === 'true') {
                    const btn = document.createElement('button');
                    btn.className = 'delete-btn';
                    btn.textContent = '删';
                    btn.onclick = async () => { await supabase.from('messages').update({ is_deleted: true }).eq('id', msg.id); loadMessages(); };
                    div.appendChild(btn);
                }
                list.appendChild(div);
            });
        }

        // 模态框
        function showTimeModal() { document.getElementById('timeModal').classList.add('active'); }
        function showVisitorModal() { document.getElementById('visitorModal').classList.add('active'); }
        function showMessageModal() { document.getElementById('messageModal').classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    </script>
</body>
</html>
