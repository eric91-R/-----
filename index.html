<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eric91-R - 数字探索者</title>
    <style>
        /* 极简深色风格，适配移动端 */
        :root {
            --bg: #0a0a0f;
            --card: #1a1a24;
            --text: #e0e0e0;
            --accent: #00d4ff;
            --border: #2a2a3a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .tagline { color: var(--accent); font-size: 1.1rem; }

        /* 卡片网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,212,255,0.1); }
        .card h2 { font-size: 1.2rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .card p { color: #aaa; font-size: 0.95rem; }

        /* 按钮 */
        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }

        /* 时间显示 */
        .time-display { font-size: 1.5rem; font-weight: bold; color: var(--accent); margin-top: 10px; }
        .date-display { font-size: 0.9rem; color: #aaa; margin-top: 5px; }

        /* 音乐状态 */
        .music-status { margin-top: 10px; font-size: 0.9rem; color: #aaa; }

        /* 访客数 */
        .visitor-count { font-size: 1.5rem; font-weight: bold; color: var(--accent); margin-top: 10px; }

        /* 模态框（弹窗） */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card);
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            position: relative;
            border: 1px solid var(--border);
        }
        .modal-close {
            position: absolute;
            top: 15px; right: 15px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .modal h2 { margin-bottom: 20px; }
        .modal p { margin-bottom: 15px; }

        /* 留言板 */
        #messageInput { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: #0f0f18; color: var(--text); margin-bottom: 10px; }
        #messageList { max-height: 300px; overflow-y: auto; margin-top: 20px; }
        .message-item { background: #0f0f18; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); }
        .message-item small { color: #888; display: block; margin-top: 5px; }

        /* 图片集 */
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .gallery-item { position: relative; border-radius: 8px; overflow: hidden; aspect-ratio: 4/3; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-item .comment { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); padding: 5px; font-size: 0.8rem; text-align: center; }

        /* 移动端优化 */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .grid { grid-template-columns: 1fr; }
            .gallery-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Eric91-R</h1>
            <div class="tagline">构建优雅的数字体验</div>
        </header>

        <div class="grid">
            <!-- 实时时间 -->
            <div class="card" onclick="showTime()">
                <h2>⏰ 实时时间</h2>
                <div class="time-display" id="currentTime">--:--:--</div>
                <div class="date-display" id="currentDate">----年--月--日</div>
            </div>

            <!-- 背景音乐 -->
            <div class="card" onclick="toggleMusic()">
                <h2>🎵 背景音乐</h2>
                <div class="music-status" id="musicStatus">点击播放</div>
                <audio id="bgMusic" loop>
                    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                </audio>
            </div>

            <!-- 访客统计 -->
            <div class="card" onclick="showVisitors()">
                <h2>👥 访客统计</h2>
                <div class="visitor-count" id="visitorCount">...</div>
                <p style="font-size:0.85rem;color:#888;">累计访问次数
            </div>

            <!-- 留言板 -->
            <div class="card" onclick="openMessageModal()">
                <h2>💬 留言板</h2>
                <p style="font-size:0.9rem;color:#aaa;">匿名留言，管理员可审核。
                <button class="btn" onclick="openMessageModal(event)">进入留言板</button>
            </div>

            <!-- 图片集 -->
            <div class="card" onclick="openGalleryModal()">
                <h2>🖼️ 图片集</h2>
                <p style="font-size:0.9rem;color:#aaa;">精选图片，点击查看大图。
                <button class="btn" onclick="openGalleryModal(event)">去看更多照片</button>
            </div>

            <!-- 个人简介（可选，你可替换） -->
            <div class="card">
                <h2>👤 关于我</h2>
                数字探索者 / Developer
                专注于构建优雅的数字体验。
            </div>
        </div>

        <!-- 留言板模态框 -->
        <div class="modal" id="messageModal" onclick="closeModal('messageModal', event)">
            <div class="modal-content" onclick="event.stopPropagation()">
                <button class="modal-close" onclick="closeModal('messageModal')">&times;</button>
                <h2>💬 留言板</h2>
                <input type="text" id="messageInput" placeholder="写下你的留言...">
                <button class="btn" onclick="postMessage()">提交留言</button>
                <div id="messageList"></div>
            </div>
        </div>

        <!-- 图片集模态框 -->
        <div class="modal" id="galleryModal" onclick="closeModal('galleryModal', event)">
            <div class="modal-content" onclick="event.stopPropagation()">
                <button class="modal-close" onclick="closeModal('galleryModal')">&times;</button>
                <h2>🖼️ 图片集</h2>
                <div class="gallery-grid">
                    <div class="gallery-item">
                        <img src="https://picsum.photos/600/400?random=1" alt="图片1">
                        <div class="comment">山间晨雾</div>
                    </div>
                    <div class="gallery-item">
                        <img src="https://picsum.photos/600/400?random=2" alt="图片2">
                        <div class="comment">海边日落</div>
                    </div>
                    <div class="gallery-item">
                        <img src="https://picsum.photos/600/400?random=3" alt="图片3">
                        <div class="comment">城市夜景</div>
                    </div>
                    <div class="gallery-item">
                        <img src="https://picsum.photos/600/400?random=4" alt="图片4">
                        <div class="comment">静物特写</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === 1. 实时时间（每秒刷新）===
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
        }
        setInterval(updateTime, 1000);
        updateTime(); // 立即执行一次

        // === 2. 背景音乐控制 ===
        const music = document.getElementById('bgMusic');
        const musicStatus = document.getElementById('musicStatus');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                musicStatus.textContent = '点击播放';
                isPlaying = false;
            } else {
                music.play().catch(e => {
                    console.log('播放失败，可能是浏览器限制，请手动点击播放');
                    musicStatus.textContent = '点击播放（需手动）';
                });
                musicStatus.textContent = '播放中...';
                isPlaying = true;
            }
        }

        // === 3. 访客统计（模拟，后续可接Supabase）===
        function showVisitors() {
            alert('访客统计功能即将上线，当前为模拟数据。\n实际访问次数：' + Math.floor(Math.random() * 1000 + 100));
        }

        // === 4. 留言板功能（模拟，后续可接Supabase）===
        let messages = []; // 模拟留言数组

        function openMessageModal(event) {
            event.stopPropagation(); // 防止触发外层卡片点击
            document.getElementById('messageModal').classList.add('active');
            loadMessages();
        }

        function closeModal(id, event) {
            if (event) event.stopPropagation();
            document.getElementById(id).classList.remove('active');
        }

        function postMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content) {
                alert('请输入留言内容');
                return;
            }
            messages.unshift({ content, time: new Date().toLocaleString() });
            input.value = '';
            loadMessages();
            alert('留言提交成功！（模拟）');
        }

        function loadMessages() {
            const list = document.getElementById('messageList');
            list.innerHTML = '';
            if (messages.length === 0) {
                list.innerHTML = '<p style="color:#888; text-align:center;">暂无留言，快来第一条吧！';
                return;
            }
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message-item';
                div.innerHTML = `${msg.content}<small>${msg.time}</small>`;
                list.appendChild(div);
            });
        }

        // === 5. 图片集模态框 ===
        function openGalleryModal(event) {
            event.stopPropagation();
            document.getElementById('galleryModal').classList.add('active');
        }

        // === 6. 全局点击关闭模态框（点击背景）===
        document.addEventListener('click', function(event) {
            const modals = document.querySelectorAll('.modal');
            modals.forEach(modal => {
                if (modal.classList.contains('active') && !modal.querySelector('.modal-content').contains(event.target)) {
                    modal.classList.remove('active');
                }
            });
        });

        // === 7. 防止模态框内点击触发关闭 ===
        document.querySelectorAll('.modal-content').forEach(content => {
            content.addEventListener('click', function(event) {
                event.stopPropagation();
            });
        });

        // === 8. 移动端触摸优化（可选，增强体验）===
        document.querySelectorAll('.card').forEach(card => {
            card.addEventListener('touchstart', function() {
                this.style.transform = 'scale(0.98)';
            });
            card.addEventListener('touchend', function() {
                this.style.transform = '';
            });
        });

        // === 9. 初始化加载留言（模拟）===
        loadMessages();

        // === 10. 简单的错误捕获（防止脚本崩溃）===
        window.onerror = function(message, source, lineno, colno, error) {
            console.error('脚本出错：', message, '在', source, '行', lineno);
            alert('页面出现小错误，请刷新重试。错误信息：' + message);
        };

    </script>
</body>
</html>
