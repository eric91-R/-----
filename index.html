<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Eric91-R | Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --klein-blue: #002FA7; /* 克莱因蓝 */
            --dark-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent: #4A90E2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: linear-gradient(-45deg, var(--klein-blue), #001f4d, #000814, #000000);
            background-size: 400% 400%;
            animation: gradientFlow 18s ease infinite;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            transition: background-color 0.5s ease;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body.dark-mode {
            background: #000;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            gap: 30px;
        }

        /* === 左侧边栏 === */
        .sidebar {
            flex: 0 0 320px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .avatar-wrapper {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--text-primary);
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .avatar-wrapper:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 47, 167, 0.7);
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sidebar h1 {
            font-size: 26px;
            text-align: center;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .sidebar .title {
            text-align: center;
            color: var(--accent);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .sidebar .bio {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar .stats {
            display: flex;
            justify-content: space-around;
            text-align: center;
            margin-bottom: 20px;
        }

        .sidebar .stats div span {
            display: block;
            font-size: 22px;
            font-weight: bold;
        }

        .sidebar .stats div small {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .sidebar .footer {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 20px;
        }

        /* === 右侧主内容 === */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-header h2 {
            font-size: 22px;
            font-weight: 600;
        }

        /* === 功能网格 === */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .feature-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease, background 0.3s ease;
            cursor: pointer;
        }

        .feature-card:hover {
            transform: translateY(-8px);
            background: rgba(255,255,255,0.15);
        }

        .feature-card h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .feature-card p {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .feature-card small {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .feature-card button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: var(--accent);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .feature-card button:hover {
            background: #357ABD;
        }

        /* === 图片集模块 === */
        .gallery-module {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease, filter 0.4s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
            filter: brightness(0.7);
        }

        .gallery-item .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
            font-size: 12px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover .overlay {
            transform: translateY(0);
        }

        /* === 主题切换按钮 === */
        .theme-switcher {
            position: fixed;
            top: 25px;
            right: 25px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 22px;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        .theme-switcher:hover {
            transform: rotate(30deg) scale(1.1);
        }

        /* === 响应式 === */
        @media (max-width: 900px) {
            .container { flex-direction: column; }
            .sidebar { position: static; width: 100%; }
            .features-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- 主题切换按钮 -->
    <div class="theme-switcher" id="themeSwitcher" title="切换主题">🌙</div>

    <div class="container">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <a href="#about" id="avatarLink">
                <div class="avatar-wrapper">
                    <img src="me.jpg" alt="Eric91-R">
                </div>
            </a>
            <h1>Eric91-R</h1>
            <div class="title">数字探索者 / Developer</div>
            <div class="bio">
                专注于构建优雅的数字体验。<br>
                相信每一刻都是新的开始。<br>
                <strong>[此处填写你的个人简介，例如：毕业于XX大学，擅长前端交互与UI设计]</strong>
            </div>
            <div class="stats">
                <div>
                    <span id="visitorCount">0</span>
                    <small>访客</small>
                </div>
                <div>
                    <span id="projectCount">5</span>
                    <small>作品</small>
                </div>
            </div>
            <div class="footer">
                © 2025 Eric91-R<br>
                Hosted on GitHub Pages
            </div>
        </aside>

        <!-- 右侧主内容 -->
        <main class="main-content">
            <!-- 功能卡片区 -->
            <section>
                <div class="section-header"><h2>功能中心</h2></div>
                <div class="features-grid">
                    <div class="feature-card" onclick="openMessageBoard()">
                        <h3>💬 留言板</h3>
                        <p>互动</p>
                        <small>点击进入留言</small>
                        <button>进入</button>
                    </div>
                    <div class="feature-card" onclick="openGalleryPage()">
                        <h3>🖼️ 图片集</h3>
                        <p>浏览</p>
                        <small>滑动查看大图</small>
                        <button>浏览</button>
                    </div>
                    <div class="feature-card">
                        <h3>⏰ 实时时间</h3>
                        <p id="currentTime">--:--:--</p>
                        <small id="currentDate">加载中...</small>
                    </div>
                    <div class="feature-card">
                        <h3>🎵 背景音乐</h3>
                        <p id="musicStatus">暂停</p>
                        <small>点击控制播放</small>
                        <button id="musicBtn">播放</button>
                        <audio id="bgMusic" loop>
                            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                        </audio>
                    </div>
                </div>
            </section>

            <!-- 图片集模块 -->
            <section class="gallery-module">
                <div class="section-header"><h2>精选图片</h2></div>
                <div class="gallery-grid">
                    <div class="gallery-item" onclick="openLightbox('photo1.jpg')">
                        <img src="photo1.jpg" alt="Photo 1">
                        <div class="overlay">光影瞬间 1</div>
                    </div>
                    <div class="gallery-item" onclick="openLightbox('photo2.jpg')">
                        <img src="photo2.jpg" alt="Photo 2">
                        <div class="overlay">光影瞬间 2</div>
                    </div>
                    <div class="gallery-item" onclick="openLightbox('photo3.jpg')">
                        <img src="photo3.jpg" alt="Photo 3">
                        <div class="overlay">光影瞬间 3</div>
                    </div>
                    <div class="gallery-item" onclick="openLightbox('photo4.jpg')">
                        <img src="photo4.jpg" alt="Photo 4">
                        <div class="overlay">光影瞬间 4</div>
                    </div>
                    <div class="gallery-item" onclick="openLightbox('photo5.jpg')">
                        <img src="photo5.jpg" alt="Photo 5">
                        <div class="overlay">光影瞬间 5</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 灯箱 -->
    <div id="lightbox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center;" onclick="this.style.display='none'">
        <img id="lightboxImg" src="" style="max-width:90%; max-height:90%; border-radius:12px;">
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // === Supabase 配置（请务必替换成你的密钥）===
        const SUPABASE_URL = 'https://cjmbiavxmionhvchctlif.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ES5Wf2uufFD088bVpzgRtQ_8MGKF...'; // <-- 换成你的真实密钥
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // === 1. 深色模式切换（核心修复）===
        const themeSwitcher = document.getElementById('themeSwitcher');
        themeSwitcher.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            themeSwitcher.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // 加载时恢复主题
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            themeSwitcher.textContent = '☀️';
        }

        // === 2. 实时时间 ===
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('zh-CN', {hour12: false});
            document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
        }
        setInterval(updateTime, 1000);
        updateTime();

        // === 3. 背景音乐 ===
        const music = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        const musicStatus = document.getElementById('musicStatus');
        musicBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (music.paused) {
                music.play();
                musicBtn.textContent = '暂停';
                musicStatus.textContent = '播放中';
            } else {
                music.pause();
                musicBtn.textContent = '播放';
                musicStatus.textContent = '暂停';
            }
        });

        // === 4. 访客统计（真实）===
        async function recordVisit() {
            try {
                await supabase.from('visitors').insert({ page: 'home' });
                const { count } = await supabase.from('visitors').select('*', { count: 'exact', head: true });
                document.getElementById('visitorCount').textContent = count || 0;
            } catch (e) {
                console.error('访客记录失败:', e);
                document.getElementById('visitorCount').textContent = 'N/A';
            }
        }
        recordVisit();

        // === 5. 灯箱 ===
        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            document.getElementById('lightboxImg').src = src;
            lb.style.display = 'flex';
        }

        // === 6. 页面跳转（预留）===
        function openMessageBoard() {
            alert('留言板页面开发中...\n\n你可以后续创建 message.html 并在这里跳转。\n\n管理员删除功能需在 Supabase 中配置 RLS 策略。');
            // window.location.href = '/message.html';
        }

        function openGalleryPage() {
            alert('图片浏览页面开发中...\n\n你可以后续创建 gallery.html 并在这里跳转。\n\n滑动效果和评论功能将在此实现。');
            // window.location.href = '/gallery.html';
        }

        // === 7. 头像点击 ===
        document.getElementById('avatarLink').addEventListener('click', (e) => {
            e.preventDefault();
            alert('个人简介页面\n\n这里可以跳转到 about.html。\n\n你可以在此填写详细的个人经历、技能栈和联系方式。');
            // window.location.href = '/about.html';
        });
    </script>
</body>
</html>
