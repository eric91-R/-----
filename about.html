<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Eric91-R - 关于我</title>
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: 60px auto; padding: 20px; }
        .avatar { width: 130px; height: 130px; border-radius: 50%; border: 4px solid #38bdf8; margin: 0 auto 20px; display: block; }
        h1 { text-align: center; font-size: 2.2rem; color: #38bdf8; margin-bottom: 10px; }
        .typing { text-align: center; font-size: 1.2rem; color: #94a3b8; margin-bottom: 40px; border-right: 2px solid #38bdf8; white-space: nowrap; overflow: hidden; width: 0; animation: typing 3s steps(40) forwards, blink 0.75s step-end infinite; }
        @keyframes typing { to { width: 100%; } } @keyframes blink { 50% { border-color: transparent; } }
        .section { margin: 30px 0; }
        .section h2 { color: #38bdf8; border-left: 4px solid #38bdf8; padding-left: 10px; margin-bottom: 15px; }
        .skills { display: flex; flex-wrap: wrap; gap: 10px; }
        .skill-tag { background: #1e293b; padding: 8px 16px; border-radius: 20px; }
        .back-btn { display: block; width: max-content; margin: 40px auto 0; padding: 12px 24px; background: #38bdf8; color: #0f172a; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <!-- ⚠️ 替换成你的头像 -->
        <img src="https://avatars.githubusercontent.com/u/your-github-id?v=4" alt="Eric91-R" class="avatar">
        <h1>Eric91-R</h1>
        <div class="typing">构建优雅的数字体验</div>

        <div class="section">
            <h2>关于我</h2>
            <p>一名专注于前端交互与用户体验的开发者。热衷于将创意转化为流畅的界面，坚信细节决定成败。</p>
        </div>

        <div class="section">
            <h2>技能栈</h2>
            <div class="skills">
                <span class="skill-tag">HTML / CSS</span>
                <span class="skill-tag">JavaScript</span>
                <span class="skill-tag">Supabase</span>
                <span class="skill-tag">响应式设计</span>
                <span class="skill-tag">Git & GitHub</span>
            </div>
        </div>

        <a href="index.html" class="back-btn">← 返回首页</a>
    </div>
</body>
</html>
